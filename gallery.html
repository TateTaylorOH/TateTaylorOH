<h1>Image Gallery</h1>

{% for file in site.static_files %}
  {% if file.path contains '/assets/images/corgipics/' %}
    <a href="{{ file.path }}" target="_blank">
      <img src="{{ file.path }}" style="width:200px; margin:10px;">
    </a>
  {% endif %}
{% endfor %}
