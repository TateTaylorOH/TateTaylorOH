---
layout: default
image_align: center
---
<div id="content" class="image-{{ page.image_align | default: 'center' }}">
  {% unless page.hide_image %}
  <img class="img-fluid mb-3" src="{{ page.image }}" alt="{{ page.title }}">
  {% endunless %}
  {{ content }}
  <hr>
  <span class="post-meta text-secondary">
    <p style="text-align:left;">
      {{ page.date | date_to_string }} • {{ page.author }}
    </p>
  </span>
</div>
