---
layout: default
title: Corgi Pictures
---
<h1>{{ page.title }}</h1>
{% assign images = site.static_files | where_exp: "file", "file.path contains '/assets/images/corgipics/'" | sort: "path" | reverse %}
{% for file in images %}
  <a href="{{ file.path }}" target="_blank">
    <img src="{{ file.path }}" style="width:200px; margin:10px;">
  </a>
{% endfor %}
